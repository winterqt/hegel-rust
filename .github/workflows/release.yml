name: Release

on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows: [Lint, Test, Test All Features, Docs, Coverage, Conformance, Nix]
    types: [completed]
    branches: [main]

permissions: {}

jobs:
  release:
    name: release
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check all required workflows passed
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          CHECKS=$(gh api "repos/$REPO/commits/$COMMIT_SHA/check-runs" \
            --paginate --jq '.check_runs[] | select(.name != "release") | .conclusion')
          if echo "$CHECKS" | grep -qvE '^success$'; then
            echo "Not all checks passed yet, skipping release"
            exit 0
          fi

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}

      - name: Re-checkout with app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          token: ${{ steps.app-token.outputs.token }}

      - name: Install Rust
        if: steps.check.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: python .github/scripts/release.py release
